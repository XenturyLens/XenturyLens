document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n        <span onclick=\"{{ services }}\" style=\"cursor:pointer; color:{{ cServices }}; transition:color .2s;\">Services<\u002Fspan>\n        <span onclick=\"{{ about }}\" style=\"cursor:pointer; color:{{ cAbout }}; transition:color .2s;\">Studio<\u002Fspan>\n        <span onclick=\"{{ contact }}\" style=\"cursor:pointer; background:#1d1d1f; color:#fff; padding:8px 17px; border-radius:100px; font-size:13.5px; font-weight:500;\">Start a project<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ================= HOME ================= -->\n  <div style=\"display:{{ isHome }};\">\n\n    <!-- hero -->\n    <section style=\"padding:188px 40px 110px; max-width:1280px; margin:0 auto; position:relative; overflow:hidden;\">\n      <div style=\"position:absolute; right:-130px; top:60px; opacity:.5; pointer-events:none;\">\n        <svg width=\"560\" height=\"560\" viewBox=\"0 0 560 560\" fill=\"none\" style=\"animation:xl-spin 70s linear infinite;\">\n          <circle cx=\"280\" cy=\"280\" r=\"278\" stroke=\"#1d1d1f\" stroke-width=\"1\" opacity=\".10\"><\u002Fcircle>\n          <circle cx=\"280\" cy=\"280\" r=\"214\" stroke=\"#1d1d1f\" stroke-width=\"1\" opacity=\".14\"><\u002Fcircle>\n          <circle cx=\"280\" cy=\"280\" r=\"150\" stroke=\"#1d1d1f\" stroke-width=\"1\" opacity=\".18\"><\u002Fcircle>\n          <circle cx=\"280\" cy=\"280\" r=\"86\" stroke=\"#1d1d1f\" stroke-width=\"1\" opacity=\".24\"><\u002Fcircle>\n          <circle cx=\"280\" cy=\"280\" r=\"14\" fill=\"#0071e3\" opacity=\".5\"><\u002Fcircle>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div style=\"position:relative;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.18em; color:#86868b; text-transform:uppercase;\">Product engineering studio<\u002Fdiv>\n      <\u002Fdiv>\n      <h1 style=\"position:relative; font-size:88px; line-height:1.0; letter-spacing:-.04em; font-weight:600; margin:30px 0 0; max-width:15ch;\">Software built to last a hundred years.<\u002Fh1>\n      <p style=\"position:relative; font-size:23px; line-height:1.5; color:#52525a; max-width:44ch; margin:34px 0 0;\">We design and engineer digital products with the patience of architecture and the precision of a lens. We see beyond the product.<\u002Fp>\n      <div style=\"position:relative; display:flex; gap:14px; margin-top:44px;\">\n        <span onclick=\"{{ work }}\" style=\"cursor:pointer; background:#0071e3; color:#fff; padding:14px 28px; border-radius:100px; font-size:16px; font-weight:500;\">See our work<\u002Fspan>\n        <span onclick=\"{{ services }}\" style=\"cursor:pointer; border:1px solid rgba(0,0,0,.16); padding:14px 28px; border-radius:100px; font-size:16px; font-weight:500;\">How we build<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ethos band -->\n    <section data-reveal=\"1\" style=\"transition:opacity .8s ease, transform .8s ease; max-width:1280px; margin:0 auto; padding:90px 40px; border-top:1px solid rgba(0,0,0,.07);\">\n      <div style=\"font-size:48px; line-height:1.18; letter-spacing:-.025em; font-weight:500; max-width:24ch;\">We see beyond the product — to the system beneath it, and the decade after it.<\u002Fdiv>\n      <div style=\"font-size:19px; color:#86868b; max-width:52ch; margin-top:28px; line-height:1.55;\">Anyone can ship a feature. We build the foundations that let a product compound in value long after launch: clean architecture, considered design, code written to be read in ten years.<\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- capabilities -->\n    <section data-reveal=\"1\" style=\"transition:opacity .8s ease, transform .8s ease; max-width:1280px; margin:0 auto; padding:40px 40px 90px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.16em; color:#86868b; text-transform:uppercase; margin-bottom:36px;\">What we do<\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:rgba(0,0,0,.08); border:1px solid rgba(0,0,0,.08); border-radius:16px; overflow:hidden;\">\n        <div style=\"background:#fff; padding:34px 28px;\"><div style=\"font-size:13px; font-family:'IBM Plex Mono',monospace; color:#0071e3;\">01<\u002Fdiv><div style=\"font-size:20px; font-weight:600; margin-top:18px; letter-spacing:-.01em;\">Strategy<\u002Fdiv><div style=\"font-size:15px; color:#86868b; margin-top:10px; line-height:1.5;\">Product direction, scoping and architecture before a line is written.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#fff; padding:34px 28px;\"><div style=\"font-size:13px; font-family:'IBM Plex Mono',monospace; color:#0071e3;\">02<\u002Fdiv><div style=\"font-size:20px; font-weight:600; margin-top:18px; letter-spacing:-.01em;\">Design<\u002Fdiv><div style=\"font-size:15px; color:#86868b; margin-top:10px; line-height:1.5;\">Interface and system design with obsessive attention to detail.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#fff; padding:34px 28px;\"><div style=\"font-size:13px; font-family:'IBM Plex Mono',monospace; color:#0071e3;\">03<\u002Fdiv><div style=\"font-size:20px; font-weight:600; margin-top:18px; letter-spacing:-.01em;\">Engineering<\u002Fdiv><div style=\"font-size:15px; color:#86868b; margin-top:10px; line-height:1.5;\">Resilient, maintainable builds across web, mobile and platform.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#fff; padding:34px 28px;\"><div style=\"font-size:13px; font-family:'IBM Plex Mono',monospace; color:#0071e3;\">04<\u002Fdiv><div style=\"font-size:20px; font-weight:600; margin-top:18px; letter-spacing:-.01em;\">Stewardship<\u002Fdiv><div style=\"font-size:15px; color:#86868b; margin-top:10px; line-height:1.5;\">We stay — evolving products long after the first release.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- selected work -->\n    <section data-reveal=\"1\" style=\"transition:opacity .8s ease, transform .8s ease; max-width:1280px; margin:0 aut ill tend to.<\u002Fh1>\n      <p style=\"font-size:20px; color:#52525a; max-width:50ch; margin:26px 0 0; line-height:1.5;\">A studio is judged by what survives. These are built to.<\u002Fp>\n    <\u002Fsection>\n\n    <!-- featured -->\n    <section data-reveal=\"1\" style=\"transition:opacity .8s ease, transform .8s ease; max-width:1280px; margin:0 auto; padding:50px 40px 30px;\">\n      <div style=\"border-radius:22px; overflow:hidden; border:1px solid rgba(0,0,0,.07); background:#fff;\">\n        <image-slot id=\"work-feat\" style=\"width:100%; height:520px;\" shape=\"rect\" placeholder=\"Drop featured case image\"><\u002Fimage-slot>\n        <div style=\"padding:44px 48px; display:flex; justify-content:space-between; align-items:flex-end; gap:40px;\">\n          <div>\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.12em; color:#0071e3;\">FEATURED · MOBILITY<\u002Fdiv>\n            <div style=\"font-size:38px; font-weight:600; letter-spacing:-.02em; margin-top:14px;\">Africarstruck<\u002Fdiv>\n            <div style=\"font-size:18px; color:#52525a; margin-top:12px; max-width:54ch; line-height:1.5;\">A mobility platform rebuilt from the ground up — new product architecture, design system and engineering for scale across markets.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:8px; flex:none;\"><span style=\"font-size:13px; border:1px solid rgba(0,0,0,.14); padding:7px 14px; border-radius:100px; color:#52525a;\">Strategy<\u002Fspan><span style=\"font-size:13px; border:1px solid rgba(0,0,0,.14); padding:7px 14px; border-radius:100px; color:#52525a;\">Design<\u002Fspan><span style=\"font-size:13px; border:1px solid rgba(0,0,0,.14); padding:7px 14px; border-radius:100px; color:#52525a;\">Engineering<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- grid -->\n    <section data-reveal=\"1\" style=\"transition:opacity .8s ease, transform .8s ease; ma \n\n    <section data-reveal=\"1\" style=\"transition:opacity .8s ease, transform .8s ease; max-width:1280px; margin:0 auto; padding:50px 40px 30px;\">\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:22px;\">\n        <div style=\"background:#fff; border:1px solid rgba(0,0,0,.07); border-radius:18px; padding:40px 38px;\"><div style=\"font-size:24px; font-weight:600; letter-spacing:-.01em;\">Product strategy<\u002Fdiv><div style=\"font-size:16px; color:#52525a; margin-top:14px; line-height:1.55;\">We start with the problem, not the platform. Scoping, technical architecture and a roadmap built to compound.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid rgba(0,0,0,.07); border-radius:18px; padding:40px 38px;\"><div style=\"font-size:24px; font-weight:600; letter-spacing:-.01em;\">Design<\u002Fdiv><div style=\"font-size:16px; color:#52525a; margin-top:14px; line-height:1.55;\">Interface, interaction and design systems crafted to a standard you can feel — and extend.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid rgba(0,0,0,.07); border-radius:18px; padding:40px 38px;\"><div style=\"font-size:24px; font-weight:600; letter-spacing:-.01em;\">Engineering<\u002Fdiv><div style=\"font-size:16px; color:#52525a; margin-top:14px; line-height:1.55;\">Web, mobile and platform engineering written to be maintained — clean, tested, documented, durable.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid rgba(0,0,0,.07); border-radius:18px; padding:40px 38px;\"><div style=\"font-size:24px; font-weight:600; letter-spacing:-.01em;\">Stewardship<\u002Fdiv><div style=\"font-size:16px; color:#52525a; margin-top:14px; line-height:1.55;\">We don't disappear at launch. Ongoing evolution, measurement and care for the long horizon.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- process -->\n    <section data-reveal=\"1\" style=\"transition:opacity .8s ease, transform .8s ease; max-width:1280px; margin:0 auto; padding:60px 40px 110px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.16em; color:#86868b; text-transform:uppercase; margin-bottom:10px;\">The process<\u002Fdiv>\n      <div style=\"border-top:1px solid rgba(0,0,0,.1);\">\n        <div style=\"display:grid; grid-template-columns:120px 1fr; gap:30px; padding:34px 0; border-bottom:1px solid rgba(0,0,0,.08);\"><div style=\"font-family:'IBM Plex Mono',monospace; font-size:15px; color:#0071e3;\">01<\u002Fdiv><div><div style=\"font-size:26px; font-weight:600; letter-spacing:-.01em;\">Frame<\u002Fdiv><div style=\"font-size:16px; color:#86868b; margin-top:8px; max-width:60ch; line-height:1.5;\">We define the real problem, the constraints and the hundred-year intent before committing to a direction.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:120px 1fr; gap:30px; padding:34px 0; border-bottom:1px solid rgba(0,0,0,.08);\"><div style=\"font-family:'IBM Plex Mono',monospace; font-size:15px; color:#0071e3;\">02<\u002Fdiv><div><div style=\"font-size:26px; font-weight:600; letter-spacing:-.01em;\">Design<\u002Fdiv><div style=\"font-size:16px; color:#86868b; margin-top:8px; max-width:60ch; line-height:1.5;\">Systems and interfaces designed in the open, refined until every detail earns its place.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:120px 1fr; gap:30px; padding:34px 0; border-bottom:1px solid rgba(0,0,0,.08);\"><div style=\"font-family:'IBM Plex Mono',monospace; font-size:15px; color:#0071e3;\">03<\u002Fdiv><div><div style=\"font-size:26px; font-weight:600; letter-spacing:-.01em;\">Build<\u002Fdiv><div style=\"font-size:16px; color:#86868b; margin-top:8px; max-width:60ch; line-height:1.5;\">Engineering in tight loops — shippable, tested and documented from the first commit.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:120px 1fr; gap:30px; padding:34px 0; border-bottom:1px solid rgba(0,0,0,.08);\"><div style=\"font-family:'IBM Plex Mono',monospace; font-size:15px; color:#0071e3;\">04<\u002Fdiv><div><div style=\"font-size:26px; font-weight:600; letter-spacing:-.01em;\">Endure<\u002Fdiv><div style=\"font-size:16px; color:#86868b; margin-top:8px; max-width:60ch; line-height:1.5;\">We measure, maintain and evolve — so the product keeps earning its keep for years.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n\n  <!-- ================= STUDIO / ABOUT ================= -->\n  <div style=\"display:{{ isAbout }};\">\n    <section style=\"padding:170px 40px 30px; max-width:1280px; margin:0 auto;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.18em; color:#86868b; text-transform:uppercase;\">The studio<\u002Fdiv>\n      <h1 style=\"font-size:68px; line-height:1.04; letter-spacing:-.035em; font-weight:600; margin:24px 0 0; max-width:18ch;\">A small team with a long horizon.<\u002Fh1>\n    <\u002Fsection>\n\n    <section data-reveal=\"1\" style=\"transition:opacity .8s ease, transform .8s ease; max-width:1280px; margin:0 auto; padding:40px 40px 50px;\">\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:60px; align-items:start;\">\n        <div style=\"font-size:24px; line-height:1.45; letter-spacing:-.01em; color:#1d1d1f;\">We named the studio Xenturylens — a hundred (a century) seen through a lens. It's a reminder of how we work: focus closely, and decide for the long term.<\u002Fdiv>\n        <div style=\"font-size:17px; line-height:1.6; color:#52525a;\">We began as a handful of engineers and designers building for clients who wanted more than a deliverable — they wanted partners who'd still care about the product in a decade. We're a global studio now, but the principle hasn't moved: build things worth keeping. We see beyond the product, to the people and the years that depend on it.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- values -->\n    <section data-reveal=\"1\" style=\"transition:opacity .8s ease, transform .8s ease; background:#f5f5f7;\">\n      <div style=\"max-width:1280px; margin:0 auto; padding:90px 40px; display:grid; grid-template-columns:repeat(3,1fr); gap:50px;\">\n        <div><div style=\"font-size:21px; font-weight:600; letter-spacing:-.01em;\">Craft over speed<\u002Fdiv><div style=\"font-size:15.5px; color:#86868b; margin-top:12px; line-height:1.55;\">We'd rather ship one thing properly than five things we'd be embarrassed by in a year.<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:21px; font-weight:600; letter-spacing:-.01em;\">Own the outcome<\u002Fdiv><div style=\"font-size:15.5px; color:#86868b; margin-top:12px; line-height:1.55;\">We measure ourselves by what the product does in the world, not by hours billed.<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:21px; font-weight:600; letter-spacing:-.01em;\">Build to last<\u002Fdiv><div style=\"font-size:15.5px; color:#86868b; margin-top:12px; line-height:1.55;\">Every decision is made for the version of the product that exists long after we're gone.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- people -->\n    <section data-reveal=\"1\" style=\"transition:opacity .8s ease, transform .8s ease; max-width:1280px; margin:0 auto; padding:90px 40px 110px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.16em; color:#86868b; text-transform:uppercase; margin-bottom:36px;\">The people<\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:24px;\">\n        <div><image-slot id=\"team-1\" style=\"width:100%; height:240px;\" shape=\"rounded\" radius=\"16\" placeholder=\"Photo\"><\u002Fimage-slot><div style=\"font-size:17px; font-weight:600; margin-top:14px;\">Founder<\u002Fdiv><div style=\"font-size:14px; color:#86868b; margin-top:3px;\">Direction &amp; Engineering<\u002Fdiv><\u002Fdiv>\n        <div><image-slot id=\"team-2\" style=\"width:100%; height:240px;\" shape=\"rounded\" radius=\"16\" placeholder=\"Photo\"><\u002Fimage-slot><div style=\"font-size:17px; font-weight:600; margin-top:14px;\">Design Lead<\u002Fdiv><div style=\"font-size:14px; color:#86868b; margin-top:3px;\">Product &amp; Systems<\u002Fdiv><\u002Fdiv>\n        <div><image-slot id=\"team-3\" style=\"width:100%; height:240px;\" shape=\"rounded\" radius=\"16\" placeholder=\"Photo\"><\u002Fimage-slot><div style=\"font-size:17px; font-weight:600; margin-top:14px;\">Engineer<\u002Fdiv><div style=\"font-size:14px; color:#86868b; margin-top:3px;\">Platform &amp; Mobile<\u002Fdiv><\u002Fdiv>\n        <div><image-slot id=\"team-4\" style=\"width:100%; height:240px;\" shape=\"rounded\" radius=\"16\" placeholder=\"Photo\"><\u002Fimage-slot><div style=\"font-size:17px; font-weight:600; margin-top:14px;\">Engineer<\u002Fdiv><div style=\"font-size:14px; color:#86868b; margin-top:3px;\">Frontend &amp; Craft<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n\n  <!-- ================= CONTACT ================= -->\n  <div style=\"display:{{ isContact }};\">\n    <section style=\"padding:170px 40px 110px; max-width:1280px; margin:0 auto;\">\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:80px; align-items:start;\">\n        <div>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.18em; color:#86868b; text-transform:uppercase;\">Start a project<\u002Fdiv>\n          <h1 style=\"font-size:60px; line-height:1.04; letter-spacing:-.035em; font-weight:600; margin:24px 0 0; max-width:14ch;\">Let's build something that lasts.<\u002Fh1>\n          <p style=\"font-size:19px; color:#52525a; max-width:42ch; margin:26px 0 0; line-height:1.5;\">Tell us what you're making. We reply to every serious enquiry within two business days.<\u002Fp>\n          <div style=\"margin-top:48px; display:flex; flex-direction:column; gap:20px;\">\n            <div><div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.12em; color:#86868b;\">EMAIL<\u002Fdiv><div style=\"font-size:18px; margin-top:6px;\">studio@xenturylens.com<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.12em; color:#86868b;\">WORKING WITH<\u002Fdiv><div style=\"font-size:18px; margin-top:6px;\">Founders &amp; teams, worldwide<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid rgba(0,0,0,.08); border-radius:22px; padding:40px 40px 44px;\">\n          <div style=\"display:flex; flex-direction:column; gap:22px;\">\n            <label style=\"display:block;\"><div style=\"font-size:13px; color:#52525a; margin-bottom:9px;\">Name<\u002Fdiv><input type=\"text\" placeholder=\"Your name\" style=\"width:100%; font-family:inherit; font-size:16px; padding:13px 15px; border:1px solid rgba(0,0,0,.16); border-radius:11px; outline:none; background:#fbfbfd;\"><\u002Flabel>\n            <label style=\"display:block;\"><div style=\"font-size:13px; color:#52525a; margin-bottom:9px;\">Email<\u002Fdiv><input type=\"email\" placeholder=\"you@company.com\" style=\"width:100%; font-family:inherit; font-size:16px; padding:13px 15px; border:1px solid rgba(0,0,0,.16); border-radius:11px; outline:none; background:#fbfbfd;\"><\u002Flabel>\n            <label style=\"display:block;\"><div style=\"font-size:13px; color:#52525a; margin-bottom:9px;\">Company<\u002Fdiv><input type=\"text\" placeholder=\"Optional\" style=\"width:100%; font-family:inherit; font-size:16px; padding:13px 15px; border:1px solid rgba(0,0,0,.16); border-radius:11px; outline:none; background:#fbfbfd;\"><\u002Flabel>\n            <label style=\"display:block;\"><div style=\"font-size:13px; color:#52525a; margin-bottom:9px;\">What are you building?<\u002Fdiv><textarea rows=\"4\" placeholder=\"A few sentences is plenty.\" style=\"width:100%; font-family:inherit; font-size:16px; padding:13px 15px; border:1px solid rgba(0,0,0,.16); border-radius:11px; outline:none; background:#fbfbfd; resize:vertical;\"><\u002Ftextarea><\u002Flabel>\n            <span style=\"cursor:pointer; background:#0071e3; color:#fff; padding:15px 28px; border-radius:100px; font-size:16px; font-weight:500; text-align:center;\">Send enquiry<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n\n  <!-- ================= FOOTER ================= -->\n  <footer style=\"background:#fff; border-top:1px solid rgba(0,0,0,.08);\">\n    <div style=\"max-width:1280px; margin:0 auto; padding:72px 40px 48px;\">\n      <div style=\"display:flex; justify-content:space-between; gap:60px; flex-wrap:wrap;\">\n        <div style=\"max-width:30ch;\">\n          <div style=\"display:flex; align-items:center; gap:11px;\">\n            <svg width=\"26\" height=\"26\" viewBox=\"0 0 30 30\" fill=\"none\"><circle cx=\"15\" cy=\"15\" r=\"13.2\" stroke=\"#1d1d1f\" stroke-width=\"1.3\"><\u002Fcircle><circle cx=\"15\" cy=\"15\" r=\"7.4\" stroke=\"#1d1d1f\" stroke-width=\"1.3\"><\u002Fcircle><circle cx=\"15\" cy=\"15\" r=\"2.1\" fill=\"#0071e3\"><\u002Fcircle><\u002Fsvg>\n            <span style=\"font-size:17px; font-weight:600; letter-spacing:-.02em;\">Xenturylens<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:15px; color:#86868b; margin-top:18px; line-height:1.55;\">A global product engineering studio. We see beyond the product.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:80px;\">\n          <div style=\"display:flex; flex-direction:column; gap:13px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.12em; color:#86868b;\">EXPLORE<\u002Fdiv>\n            <span onclick=\"{{ work }}\" style=\"cursor:pointer; font-size:15px; color:#1d1d1f;\">Work<\u002Fspan>\n            <span onclick=\"{{ services }}\" style=\"cursor:pointer; font-size:15px; color:#1d1d1f;\">Services<\u002Fspan>\n            <span onclick=\"{{ about }}\" style=\"cursor:pointer; font-size:15px; color:#1d1d1f;\">Studio<\u002Fspan>\n            <span onclick=\"{{ contact }}\" style=\"cursor:pointer; font-size:15px; color:#1d1d1f;\">Contact<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:13px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.12em; color:#86868b;\">CONNECT<\u002Fdiv>\n            <span style=\"font-size:15px; color:#1d1d1f;\">studio@xenturylens.com<\u002Fspan>\n            <span style=\"font-size:15px; color:#1d1d1f;\">LinkedIn<\u002Fspan>\n            <span style=\"font-size:15px; color:#1d1d1f;\">X / Twitter<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; justify-content:space-between; align-items:center; margin-top:60px; padding-top:28px; border-top:1px solid rgba(0,0,0,.07); font-size:13px; color:#86868b;\">\n        <span>© 2026 Xenturylens. Built to last.<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; letter-spacing:.06em;\">EST · A HUNDRED-YEAR STUDIO<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { page: 'home', scrolled: false };\n\n  go = (page) => {\n    this.setState({ page });\n    try { window.scrollTo({ top: 0, behavior: 'auto' }); } catch (e) { window.scrollTo(0, 0); }\n    requestAnimationFrame(() => this.setupReveal());\n  };\n\n  componentDidMount() {\n    this._onScroll = () => {\n      const s = window.scrollY > 12;\n      if (s !== this.state.scrolled) this.setState({ scrolled: s });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this.setupReveal();\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this._onScroll);\n    if (this._io) this._io.disconnect();\n  }\n\n  setupReveal() {\n    const root = this._root;\n    if (!root) return;\n    if (this._io) this._io.disconnect();\n    const els = root.querySelectorAll('[data-reveal]');\n    if (!('IntersectionObserver' in window)) {\n      els.forEach((e) => { e.style.opacity = 1; e.style.transform = 'none'; });\n      return;\n    }\n    this._io = new IntersectionObserver((entries) => {\n      entries.forEach((en) => {\n        if (en.isIntersecting) {\n          en.target.style.opacity = 1;\n          en.target.style.transform = 'none';\n          this._io.unobserve(en.target);\n        }\n      });\n    }, { threshold: 0.1, rootMargin: '0px 0px -6% 0px' });\n    els.forEach((e) => {\n      // only hide ones that are currently displayed (in the active page)\n      if (e.offsetParent === null) { e.style.opacity = 1; e.style.transform = 'none'; return; }\n      e.style.opacity = 0;\n      e.style.transform = 'translateY(22px)';\n      this._io.observe(e);\n    });\n  }\n\n  renderVals() {\n    const p = this.state.page;\n    return {\n      rootRef: (el) => { this._root = el; },\n      navBg: this.state.scrolled ? 'rgba(251,251,253,.8)' : 'rgba(251,251,253,0)',\n      navBorder: this.state.scrolled ? '1px solid rgba(0,0,0,.08)' : '1px solid rgba(0,0,0,0)',\n      home: () => this.go('home'),\n      work: () => this.go('work'),\n      services: () => this.go('services'),\n      about: () => this.go('about'),\n      contact: () => this.go('contact'),\n      isHome: p === 'home' ? 'block' : 'none',\n      isWork: p === 'work' ? 'block' : 'none',\n      isServices: p === 'services' ? 'block' : 'none',\n      isAbout: p === 'about' ? 'block' : 'none',\n      isContact: p === 'contact' ? 'block' : 'none',\n      cWork: p === 'work' ? '#1d1d1f' : '#6e6e73',\n      cServices: p === 'services' ? '#1d1d1f' : '#6e6e73',\n      cAbout: p === 'about' ? '#1d1d1f' : '#6e6e73',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
